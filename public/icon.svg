<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="128" fill="#505143" />
  
  <!-- Subtle inner background glowing circle -->
  <circle cx="256" cy="256" r="180" fill="#878568" opacity="0.3" />
  
  <!-- Open Book representation -->
  <!-- Left page -->
  <path d="M 240,160 C 200,165 150,155 120,170 L 120,340 C 150,325 200,335 240,330 Z" fill="#f2ebcf" />
  <!-- Right page -->
  <path d="M 272,160 C 312,165 362,155 392,170 L 392,340 C 362,325 312,335 272,330 Z" fill="#f2ebcf" />
  
  <!-- Spine Book line -->
  <path d="M 256,165 L 256,335" stroke="#505143" stroke-width="6" stroke-linecap="round" />
  
  <!-- Ribbon bookmark -->
  <path d="M 256,330 L 256,370 L 246,360 L 236,370 Z" fill="#e5c158" />
  
  <!-- Elegant cross or flame over pages to imply scripture readings -->
  <path d="M 256,90 Q 240,125 256,150 Q 272,125 256,90 Z" fill="#e5c158" />
  
  <!-- Stylized scripture lines on pages for realistic look -->
  <path d="M 140,200 H 220 M 140,230 H 210 M 140,260 H 220 M 140,290 H 190" stroke="#878568" stroke-width="4" stroke-linecap="round" opacity="0.7" />
  <path d="M 292,200 H 372 M 292,230 H 362 M 292,260 H 372 M 292,290 H 342" stroke="#878568" stroke-width="4" stroke-linecap="round" opacity="0.7" />
</svg>
