<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="512" height="512" fill="#d5ccab" />

  <!-- 5 radiating lines at the top -->
  <!-- Center is at (256, 256) -->
  <line x1="256" y1="256" x2="51.6" y2="138" stroke="#505143" stroke-width="4.5" stroke-linecap="square" />
  <line x1="256" y1="256" x2="138" y2="51.6" stroke="#505143" stroke-width="4.5" stroke-linecap="square" />
  <line x1="256" y1="256" x2="256" y2="20" stroke="#505143" stroke-width="4.5" stroke-linecap="square" />
  <line x1="256" y1="256" x2="374" y2="51.6" stroke="#505143" stroke-width="4.5" stroke-linecap="square" />
  <line x1="256" y1="256" x2="460.4" y2="138" stroke="#505143" stroke-width="4.5" stroke-linecap="square" />

  <!-- Horizontal bar -->
  <rect x="38" y="245" width="436" height="22" fill="#505143" />

  <!-- Cutout circle -->
  <circle cx="256" cy="267" r="16" fill="#d5ccab" />

  <!-- 5 dashed markers at the bottom -->
  <!-- Center is at (256, 256), R1 = 175, R2 = 215 -->
  <!-- Bottom-left-most (-60°) -->
  <line x1="104.5" y1="343.5" x2="69.8" y2="363.5" stroke="#505143" stroke-width="15" stroke-linecap="square" />
  <!-- Bottom-left-middle (-30°) -->
  <line x1="168.5" y1="407.5" x2="148.5" y2="442.2" stroke="#505143" stroke-width="15" stroke-linecap="square" />
  <!-- Bottom-center (0°) -->
  <line x1="256" y1="431" x2="256" y2="471" stroke="#505143" stroke-width="15" stroke-linecap="square" />
  <!-- Bottom-right-middle (+30°) -->
  <line x1="343.5" y1="407.5" x2="363.5" y2="442.2" stroke="#505143" stroke-width="15" stroke-linecap="square" />
  <!-- Bottom-right-most (+60°) -->
  <line x1="407.5" y1="343.5" x2="442.2" y2="363.5" stroke="#505143" stroke-width="15" stroke-linecap="square" />
</svg>
